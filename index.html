<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Player | System v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #video-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; background: #000; }
        .watermark { position: absolute; top: 10px; left: 10px; opacity: 0.5; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="video-container">
        <div class="watermark">SECURE_NODE_01</div>
        <video id="video" controls autoplay playsinline></video>
    </div>

    <script>
        var video = document.getElementById('video');
        // YOUR PYTHON SCRIPT WILL REPLACE THE PLACEHOLDER BELOW
        var videoSrc = 'STREAM_URL_PLACEHOLDER';

        if (Hls.isSupported()) {
            var hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
