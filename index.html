<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Node</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.light.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline controls muted></video>

    <script>
        const video = document.getElementById('video');
        const source = 'STREAM_URL_PLACEHOLDER';

        if (Hls.isSupported()) {
            const hls = new Hls({
                // PERFORMANCE TWEAKS START HERE
                enableWorker: true,        // Offloads processing to background thread
                lowLatencyMode: true,      // Essential for fast start
                backBufferLength: 0,       // Don't waste memory on old frames
                maxBufferLength: 10,       // Keep buffer lean for speed
                liveSyncDuration: 0.5,     // Stay as close to live as possible
                liveMaxLatencyDuration: 2, // Force catch-up if it lags
                manifestLoadingMaxRetry: 10
            });

            hls.loadSource(source);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {
                    console.log("Autoplay blocked, waiting for user interaction");
                });
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari/iOS native support
            video.src = source;
        }
    </script>
</body>
</html>
