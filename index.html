<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://google.com">
    <title>Stream Gateway</title>
    <style>
        body { background: #0b0e14; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { border: 4px solid #1a1f2b; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <div style="font-size: 18px; letter-spacing: 1px;">VERIFYING CONNECTION...</div>
        <div style="font-size: 12px; color: #555; margin-top: 10px;">Please do not refresh the page.</div>
    </div>
</body>
</html>
